name: secretsmanager
version: 1
secrets:
  OP_SERVICE_ACCOUNT_TOKEN: .env
skill_dependencies: []

docs: |
  ## Secrets Manager

  The bootstrap skill. Handles two responsibilities:

  1. **Skill activation** — parses any skill's `skill.yml`, resolves its dependency tree, injects secrets, and dynamically imports functions.
  2. **1Password vault management** — CRUD operations on the `personal_agent_workspace` vault (create + read only, no delete/edit).

  All other skills are activated through this one. It is always loaded first.

  ### Activation

  - `activate(skillName)` — entry point. Pass a skill name (matching its folder under `skills/`). Returns an activation summary with loaded dependencies, injected secret names, and available functions.

  ### Secret Resolution

  - `resolveSecrets(secretsMap)` — takes a `Record<string, string>` mapping env var names to `op://` references. Calls `op read` for each, sets `process.env`. Returns list of injected env var names.

  ### Vault Management

  - `createSecret(itemName, fieldName, value, vault?)` — creates a new item in 1Password. Cannot overwrite existing items.
  - `listSecrets(vault?)` — returns item names and metadata. Never returns values.
  - `getSecretMetadata(itemName, vault?)` — returns item metadata (created, updated, field labels/types). Never returns values.

  ### Constraints

  - The agent can create and read metadata, never delete or modify existing secrets.
  - User manages deletion/editing through the 1Password app directly.
  - `OP_SERVICE_ACCOUNT_TOKEN` must be set in the root `.env` file (gitignored). This is the only secret stored locally — everything else lives in 1Password.
