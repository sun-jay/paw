  ### Step 3 — ALWAYS Send via iMessage (MANDATORY — NOT optional)

  **YOU MUST ALWAYS send the iMessage brief after compiling the briefing. Do NOT skip this step.
  Do NOT wait for the user to ask. This is part of the daily brief procedure.**

  Send a concise phone-friendly summary via iMessage
  to sunny.jyrm@gmail.com. Use `osascript` to send.

  **iMessage formatting rules** (AppleScript only supports plain text):
  - NO markdown — no **, no ##, no []() links
  - Use emoji for visual hierarchy: ⚠️ urgent, 📅 calendar, 📚 academics, 📧 email
  - Use • for bullets
  - Use ALL CAPS for section headers
  - URLs go on their own line (iMessage auto-links them)
  - Keep it SHORT — max ~30 lines, only the most important items
  - Include the remote control URL (read from ~/.claude/remote-url.txt) at the bottom
    with a label like "→ Continue this conversation:" so the user can tap to respond

  **iMessage brief structure:**
  ```
  ☀️ Daily Brief — {date}

  ⚠️ URGENT
  • Assignment Name (COURSE) — due Tomorrow 11:59 PM
    ❌ Not submitted
    bcourses.berkeley.edu/courses/.../assignments/...

  📅 TODAY
  • 10:00 AM  Meeting name
  • 2:00 PM   Class name

  📚 THIS WEEK
  • Assignment (COURSE) — due Wed Mar 18
    ✅ Submitted

  📧 NEEDS RESPONSE
  • Email subject — from Sender

  → Continue this conversation:
  https://claude.ai/code/session_...
  ```

  **How to send:**
  ```bash
  osascript -e 'tell application "Messages" to send "MESSAGE_TEXT" to buddy "sunny.jyrm@gmail.com"'
  ```
  Escape double quotes in the message with backslash. For newlines, use \n inside
  the AppleScript string or build the message with `& return &` joins.

  ### Functions

  - `readable_academicBrief()` — combined Canvas + EdStem + school email briefing (parallel fetch)
  - `raw_canvasBrief()` — Canvas data only (todo, missing, assignments, announcements, submissions)
  - `raw_edBrief()` — EdStem data only (recent threads, keyword search across active courses)
  - `raw_schoolEmail()` — School email inbox summary
